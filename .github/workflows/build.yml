name: CI Core

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
        default: ""
      build_type:
        required: true
        type: string
        default: "current"
      build_rt:
        required: true
        type: boolean
        default: true
      build_zfs:
        required: true
        type: boolean
        default: true
      is_release:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    container:
      image: nevuly/nevuly-dev-base:build
      options: --privileged
    outputs:
      X86_BUILD_ROWS: ${{ steps.gen-sha-256.outputs.X86_BUILD_ROWS }}
      X86_RT_BUILD_ROWS: ${{ steps.gen-sha-256.outputs.X86_RT_BUILD_ROWS }}
      ARM64_BUILD_ROWS: ${{ steps.gen-sha-256.outputs.ARM64_BUILD_ROWS }}
      ARM64_RT_BUILD_ROWS: ${{ steps.gen-sha-256.outputs.ARM64_RT_BUILD_ROWS }}
    strategy:
      matrix: ${{ fromJSON(inputs.build_rt && '{"include":[{"arch":"x86","image-name":"bzImage-x86_64","os":"ubuntu-24.04"},{"arch":"x86-rt","image-name":"bzImage-x86_64-rt","os":"ubuntu-24.04"},{"arch":"arm64","image-name":"Image-arm64","os":"ubuntu-24.04-arm"},{"arch":"arm64-rt","image-name":"Image-arm64-rt","os":"ubuntu-24.04-arm"}]}' || '{"include":[{"arch":"x86","image-name":"bzImage-x86_64","os":"ubuntu-24.04"},{"arch":"arm64","image-name":"Image-arm64","os":"ubuntu-24.04-arm"}]}') }}

    steps:
      - name: Trust Build Directory
        run: |
          git config --global --add safe.directory /__w/WSL2-Linux-Kernel-Rolling/WSL2-Linux-Kernel-Rolling

      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: master

      - name: Download WSL2 Stable Kernel
        run: |
          git clone https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling.git --depth 1 -b ${{ inputs.tag_name }} linux

      - name: Check Kernel Version
        id: check-version
        run: |
          if [ ${{ inputs.build_type }} == "emus" ]; then
          IFS=- read -r var1 var2 var3 version var4 <<< ${{ inputs.tag_name }}
          else
          IFS=- read -r var1 var2 var3 version <<< ${{ inputs.tag_name }}
          fi
          echo "KERNEL_VERSION=$version" >> $GITHUB_OUTPUT
          echo "Kernel Version: $version"

      - name: Build WSL2 Stable Kernel
        run: |
          cd linux
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          make KCONFIG_CONFIG=arch/x86/configs/config-wsl-${{ matrix.arch }} -j$(echo `nproc` + 1 | bc)
          cp arch/x86/boot/bzImage ../${{ matrix.image-name }}
          elif [ ${{ matrix.arch }} == "arm64" ] || [ ${{ matrix.arch }} == "arm64-rt" ]; then
          make KCONFIG_CONFIG=arch/arm64/configs/config-wsl-${{ matrix.arch }} -j$(echo `nproc` + 1 | bc)
          cp arch/arm64/boot/Image ../${{ matrix.image-name }}
          fi

      - name: Generate Kernel Modules
        run: |
          cd linux
          mkdir -p ${{ matrix.image-name }}-addon_install && make modules_install INSTALL_MOD_PATH=${{ matrix.image-name }}-addon_install
          if [ ${{ inputs.build_type }} == "emus" ]; then
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+/build
          else
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+/build
          fi
          else
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+/build
          else
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+/build
          fi
          fi

      - name: Generate Kernel Headers and Documents
        run: |
          cd linux
          if [ ${{ inputs.build_type }} == "emus" ]; then
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+/build
          else
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+/build
          fi
          else
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+/build
          else
          export addon_path=${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+/build
          fi
          fi
          mkdir -p $addon_path
          install -Dt "$addon_path" -m644 Makefile Module.symvers System.map vmlinux
          install -Dt "$addon_path/kernel" -m644 kernel/Makefile
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          install -Dt "$addon_path/arch/x86" -m644 arch/x86/Makefile
          else
          install -Dt "$addon_path/arch/arm64" -m644 arch/arm64/Makefile
          fi
          cp -t "$addon_path" -a scripts
          ln -srt "$addon_path" "addon_path/scripts/gdb/vmlinux-gdb.py"
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          install -Dt "$addon_path/tools/objtool" tools/objtool/objtool
          fi
          install -Dt "$addon_path/tools/bpf/resolve_btfids" tools/bpf/resolve_btfids/resolve_btfids
          cp -t "$addon_path" -a include
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          cp -t "$addon_path/arch/x86" -a arch/x86/include
          install -Dt "$addon_path/arch/x86/kernel" -m644 arch/x86/kernel/asm-offsets.s
          else
          cp -t "$addon_path/arch/arm64" -a arch/arm64/include
          install -Dt "$addon_path/arch/arm64/kernel" -m644 arch/arm64/kernel/asm-offsets.s
          mkdir -p "$addon_path/arch/arm"
          cp -t "$addon_path/arch/arm" -a arch/arm/include
          fi
          install -Dt "$addon_path/drivers/md" -m644 drivers/md/*.h
          install -Dt "$addon_path/net/mac80211" -m644 net/mac80211/*.h
          install -Dt "$addon_path/drivers/media/i2c" -m644 drivers/media/i2c/msp3400-driver.h
          install -Dt "$addon_path/drivers/media/usb/dvb-usb" -m644 drivers/media/usb/dvb-usb/*.h
          install -Dt "$addon_path/drivers/media/dvb-frontends" -m644 drivers/media/dvb-frontends/*.h
          install -Dt "$addon_path/drivers/media/tuners" -m644 drivers/media/tuners/*.h
          install -Dt "$addon_path/drivers/iio/common/hid-sensors" -m644 drivers/iio/common/hid-sensors/*.h
          find . -name 'Kconfig*' -exec install -Dm644 {} "$addon_path/{}" \;
          export arch
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          for arch in "$addon_path"/arch/*/; do
            [[ $arch = */x86/ ]] && continue
            echo "Removing $(basename "$arch")"
            rm -r "$arch"
          done
          else
          for arch in "$addon_path"/arch/*/; do
            [[ $arch = */arm64/ ]] && continue
            echo "Removing $(basename "$arch")"
            rm -r "$arch"
          done
          fi
          rm -r $addon_path/Documentation
          find -L "$addon_path" -type l -printf 'Removing %P\n' -delete
          find -L "$addon_path" -type f -name '*.o' -printf 'Removing %P\n' -delete
          export file
          export STRIP_SHARED
          export STRIP_STATIC
          export STRIP_BINARIES
          while read -rd '' $file; do
            case "$(file -Sib "$file")" in
              application/x-sharedlib\;*)
                strip -v $STRIP_SHARED $file ;;
              application/x-archive\;*)
                strip -v $STRIP_STATIC $file ;;
              application/x-executable\;*)
                strip -v $STRIP_BINARIES $file ;;
              application/x-pie-executable\;*)
                strip -v $STRIP_SHARED $file ;;
            esac
          done < <(find "$addon_path" -type f -perm -u+x ! -name vmlinux -print0)
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "x86-rt" ]; then
          strip -v $STRIP_STATIC "$addon_path/vmlinux"
          fi
          cp -r Documentation $addon_path/Documentation
          if [ ${{ inputs.build_type }} == "emus" ]; then
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+/build/${{ matrix.image-name }}-addon_install
          else
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+/build/${{ matrix.image-name }}-addon_install
          fi
          else
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+/build/${{ matrix.image-name }}-addon_install
          else
          rm -rf ${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+/build/${{ matrix.image-name }}-addon_install
          fi
          fi

      - name: Download ZFS
        if: ${{ inputs.build_zfs }}
        run: |
          git clone https://github.com/openzfs/zfs.git --depth 1 zfs

      - name: Build ZFS
        if: ${{ inputs.build_zfs }}
        run: |
          cd zfs
          ./autogen.sh
          ./configure --with-linux="$(pwd)/../linux" --with-linux-obj="$(pwd)/../linux"
          make -j$(echo `nproc` + 1 | bc)

      - name: Generate ZFS Kernel Module
        if: ${{ inputs.build_zfs }}
        run: |
          if [ ${{ inputs.build_type }} == "emus" ]; then
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          mkdir -p linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+/extra
          find zfs/module -name "*.ko" -exec cp {} linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+/extra \;
          else
          mkdir -p linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+/extra
          find zfs/module -name "*.ko" -exec cp {} linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+/extra \;
          fi
          else
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          mkdir -p linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+/extra
          find zfs/module -name "*.ko" -exec cp {} linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+/extra \;
          else
          mkdir -p linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+/extra
          find zfs/module -name "*.ko" -exec cp {} linux/${{ matrix.image-name }}-addon_install/lib/modules/${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+/extra \;
          fi
          fi

      - name: Generate Kernel Addon Package
        run: |
          cd linux
          if [ ${{ inputs.build_type }} == "emus" ]; then
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          sudo ../.github/scripts/gen_modules_vhdx.sh "$PWD/${{ matrix.image-name }}-addon_install/" "${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE-EMUS+" ${{ matrix.image-name }}-addon.vhdx
          else
          sudo ../.github/scripts/gen_modules_vhdx.sh "$PWD/${{ matrix.image-name }}-addon_install/" "${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE-EMUS+" ${{ matrix.image-name }}-addon.vhdx
          fi
          else
          if [ ${{ matrix.arch }} == "x86" ] || [ ${{ matrix.arch }} == "arm64" ]; then
          sudo ../.github/scripts/gen_modules_vhdx.sh "$PWD/${{ matrix.image-name }}-addon_install/" "${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-STABLE+" ${{ matrix.image-name }}-addon.vhdx
          else
          sudo ../.github/scripts/gen_modules_vhdx.sh "$PWD/${{ matrix.image-name }}-addon_install/" "${{ steps.check-version.outputs.KERNEL_VERSION }}-WSL2-RT-STABLE+" ${{ matrix.image-name }}-addon.vhdx
          fi
          fi
          7z a -mx=9 ${{ matrix.image-name }}-addon.vhdx.7z ${{ matrix.image-name }}-addon.vhdx > /dev/null
          mv ${{ matrix.image-name }}-addon.vhdx ../
          mv ${{ matrix.image-name }}-addon.vhdx.7z ../

      - name: Generate SHA-256 Checksum
        id: gen-sha-256
        run: |
          read -r imageSHA rest <<< "$(sha256sum ${{ matrix.image-name }})"
          read -r addonSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx)"
          read -r addon7zSHA rest <<< "$(sha256sum ${{ matrix.image-name }}-addon.vhdx.7z)"
          {
            echo "SUMMARY_ROWS<<EOF"
            echo "| ${{ matrix.image-name }} | $imageSHA |"
            echo "| ${{ matrix.image-name }}-addon.vhdx | $addonSHA |"
            echo "| ${{ matrix.image-name }}-addon.vhdx.7z | $addon7zSHA |"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          if [ ${{ inputs.is_release }} == "true" ] && [ ${{ inputs.build_type }} == "current" ]; then
          {
            if [ ${{ matrix.arch }} == "x86" ]; then
            echo "X86_BUILD_ROWS<<EOF"
            elif [ ${{ matrix.arch }} == "x86-rt" ]; then
            echo "X86_RT_BUILD_ROWS<<EOF"
            elif [ ${{ matrix.arch }} == "arm64" ]; then
            echo "ARM64_BUILD_ROWS<<EOF"
            else
            echo "ARM64_RT_BUILD_ROWS<<EOF"
            fi
            echo "| ${{ matrix.image-name }} | $imageSHA |"
            echo "| ${{ matrix.image-name }}-addon.vhdx | $addonSHA |"
            echo "| ${{ matrix.image-name }}-addon.vhdx.7z | $addon7zSHA |"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          fi

      - name: Upload Kernel Images
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.image-name }}
          path: |
            ${{ matrix.image-name }}
            ${{ matrix.image-name }}-addon.vhdx.7z
          if-no-files-found: error

      - name: Generate Build Summary
        run: |
          {
            if [ ${{ inputs.build_type }} == "emus" ]; then
            echo "## ${{ steps.check-version.outputs.KERNEL_VERSION }} Stable Extended Maintenance Update Build (${{ matrix.arch }})"
            echo
            echo "> [!NOTE]"
            echo "> **This build not be release.**"
            else
            echo "## ${{ steps.check-version.outputs.KERNEL_VERSION }} Stable Build (${{ matrix.arch }})"
            fi
            echo
            echo "### Hash Information"
            echo "| File Name | SHA-256 Checksum |"
            echo "|:--------------:|:------:|"
            echo "${{ steps.gen-sha-256.outputs.SUMMARY_ROWS }}"
          } >> $GITHUB_STEP_SUMMARY

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.is_release && inputs.build_type == 'current' }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Download Kernel Images
        uses: actions/download-artifact@main
        with:
          path: release_images/

      - name: Generate Release Note
        run: |
          {
            echo "> [!WARNING]"
            echo "> ARM64 kernel has not been tested!"
            echo ">"
            echo "> If you have any issues, please leave an issue on the [issue tab](https://github.com/Nevuly/WSL2-Rolling-Kernel-Issue/issues)!"
            echo
            if [ ${{ inputs.build_rt }} != "true" ]; then
            echo "> [!NOTE]"
            echo "> This build not included RT kernel!"
            echo
            fi
            if [ ${{ inputs.build_zfs }} != "true" ]; then
            echo "> [!NOTE]"
            echo "> This build not included ZFS kernel module!"
            echo ">"
            echo "> It will be include again when ZFS driver support current kernel."
            echo
            fi
            echo "### **Hash Information**"
            echo "| File Name | SHA-256 Checksum |"
            echo "|:--------------:|:------:|"
            echo "${{ needs.build.outputs.X86_BUILD_ROWS }}"
            if [ ${{ inputs.build_rt }} == "true" ]; then
            echo "${{ needs.build.outputs.X86_RT_BUILD_ROWS }}"
            fi
            echo "${{ needs.build.outputs.ARM64_BUILD_ROWS }}"
            if [ ${{ inputs.build_rt }} == "true" ]; then
            echo "${{ needs.build.outputs.ARM64_RT_BUILD_ROWS }}"
            fi
            echo
            echo "### **How to install this kernel or kernel addon package in WSL2?**"
            echo " - Please see this [wiki](https://github.com/Nevuly/WSL2-Linux-Kernel-Rolling/wiki/Install-Instructions)."
            echo
            echo "**This kernel built on ArchLinux.**"
          } > release_note.md

      - name: Release Stable Kernel
        uses: softprops/action-gh-release@master
        with:
          name: ${{ inputs.tag_name }}
          tag_name: ${{ inputs.tag_name }}
          body_path: release_note.md
          files: |
            release_images/*/*
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          fail_on_unmatched_files: true
